name: Build documentation

on:
  push:
    branches:
      - main
      - doc-builder*
      - v*-release
      - use_templates
    tags:
      - v*
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build (defaults to the workflow commit)"
        required: false
        default: ""

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@main
    with:
      commit_sha: ${{ inputs.ref != '' && inputs.ref || github.sha }}
      package: tokenizers
      path_to_docs: tokenizers/docs/source-doc-builder/
      package_path: tokenizers/bindings/python/
      version_tag_suffix: bindings/python/py_src/
      install_rust: true
    secrets:
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
