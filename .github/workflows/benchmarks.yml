name: Benchmarks

on:
  push:
    branches: [main, ci-benchmarks]  # TODO: remove ci-benchmarks before merge
    paths:
      - "tokenizers/**"
      - "bindings/python/**"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post benchmark comment to (leave empty to just store baseline)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenizers
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download benchmark data
        run: uvx --from huggingface_hub hf download hf-internal-testing/tokenizers-bench-data --repo-type dataset --local-dir data

      - name: Run benchmarks
        run: cargo bench --bench ci_benchmark -- --output-format bencher | tee output.txt

      # Upload results to HF Hub as the new baseline (requires HF_TOKEN secret)
      - name: Upload baseline to HF Hub
        if: hashFiles('tokenizers/output.txt') != '' && env.HF_TOKEN != ''
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cp output.txt "output-${{ github.sha }}.txt"
          uvx --from huggingface_hub hf upload hf-internal-testing/tokenizers-bench \
            output.txt baseline.txt --repo-type dataset
          uvx --from huggingface_hub hf upload hf-internal-testing/tokenizers-bench \
            "output-${{ github.sha }}.txt" "history/output-${{ github.sha }}.txt" --repo-type dataset

      # Download previous baseline and compare
      - name: Compare with baseline
        if: hashFiles('tokenizers/output.txt') != ''
        id: compare
        run: |
          # Try to download previous baseline
          uvx --from huggingface_hub hf download hf-internal-testing/tokenizers-bench \
            baseline.txt --repo-type dataset --local-dir baseline_dir 2>/dev/null || true

          if [ ! -f baseline_dir/baseline.txt ]; then
            echo "No previous baseline found — skipping comparison"
            echo "has_comparison=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_comparison=true" >> "$GITHUB_OUTPUT"

          # Build comparison markdown
          {
            echo "## Benchmark results"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "| Benchmark | Baseline (ns/iter) | This run (ns/iter) | Δ |"
            echo "|-----------|-------------------:|-------------------:|--:|"

            # Parse both files into associative lookup
            while IFS= read -r line; do
              name=$(echo "$line" | sed 's/^test \(.*\) \.\.\. bench:.*/\1/')
              ns=$(echo "$line" | sed 's/.*bench: *\([0-9,]*\) ns\/iter.*/\1/' | tr -d ',')
              echo "$name $ns"
            done < output.txt | sort > /tmp/current.tsv

            while IFS= read -r line; do
              name=$(echo "$line" | sed 's/^test \(.*\) \.\.\. bench:.*/\1/')
              ns=$(echo "$line" | sed 's/.*bench: *\([0-9,]*\) ns\/iter.*/\1/' | tr -d ',')
              echo "$name $ns"
            done < baseline_dir/baseline.txt | sort > /tmp/baseline.tsv

            join /tmp/baseline.tsv /tmp/current.tsv | while read -r name base_ns cur_ns; do
              if [ "$base_ns" -gt 0 ] 2>/dev/null; then
                delta=$(( (cur_ns - base_ns) * 100 / base_ns ))
                if [ "$delta" -gt 0 ]; then
                  delta_str="+${delta}%"
                else
                  delta_str="${delta}%"
                fi
                # Format with commas for readability
                base_fmt=$(printf "%'d" "$base_ns")
                cur_fmt=$(printf "%'d" "$cur_ns")
                echo "| $name | $base_fmt | $cur_fmt | $delta_str |"
              fi
            done
          } > comparison.md

          cat comparison.md

      # Post comparison as PR comment when triggered via workflow_dispatch
      - name: Post Rust results to PR
        if: inputs.pr_number != '' && steps.compare.outputs.has_comparison == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: tokenizers
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${{ inputs.pr_number }}/comments" \
            --jq '.[] | select(.body | startswith("## Benchmark results")) | .id' | head -1)

          if [ -n "$existing" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$existing" \
              -X PATCH -F "body=@comparison.md"
          else
            gh pr comment "${{ inputs.pr_number }}" --body-file comparison.md
          fi

  benchmark-python:
    name: Run Python benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download benchmark data
        run: uvx --from huggingface_hub hf download hf-internal-testing/tokenizers-bench-data --repo-type dataset --local-dir tokenizers/data

      - name: Install Python bindings + benchmark deps
        working-directory: bindings/python
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pytest pytest-benchmark
          maturin develop --release --manifest-path Cargo.toml
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"

      - name: Run Python benchmarks
        working-directory: bindings/python
        run: |
          source .venv/bin/activate
          python -m pytest tests/test_benchmarks.py \
            --benchmark-json=bench_output.json \
            --benchmark-columns=mean,stddev,rounds \
            --benchmark-sort=name \
            -v

      - name: Upload Python baseline to HF Hub
        if: env.HF_TOKEN != ''
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        working-directory: bindings/python
        run: |
          source .venv/bin/activate
          uvx --from huggingface_hub hf upload hf-internal-testing/tokenizers-bench \
            bench_output.json python-baseline.json --repo-type dataset
