name: Benchmarks

on:
  push:
    branches: [main, ci-benchmarks]  # TODO: remove ci-benchmarks before merge
    paths:
      - "tokenizers/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post benchmark comment to (leave empty to just store baseline)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenizers
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download benchmark data
        run: uvx --from huggingface_hub hf download hf-internal-testing/tokenizers-bench-data --repo-type dataset --local-dir data

      - name: Run benchmarks
        run: cargo bench --bench ci_benchmark -- --output-format bencher | tee output.txt

      - name: Store baseline
        if: hashFiles('tokenizers/output.txt') != ''
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7
        with:
          name: Tokenizers Rust Benchmarks
          tool: cargo
          output-file-path: tokenizers/output.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          auto-push: true
          alert-threshold: "115%"
          comment-on-alert: true

      # When triggered via workflow_dispatch with a PR number, post results as a comment
      - name: Post results to PR
        if: inputs.pr_number != '' && hashFiles('tokenizers/output.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: tokenizers
        run: |
          {
            echo "## Benchmark results"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "| Benchmark | ns/iter | ± |"
            echo "|-----------|--------:|--:|"
            grep '^test ' output.txt | sed 's/^test //' | while read -r line; do
              name=$(echo "$line" | sed 's/ \.\.\. bench: .*//')
              ns=$(echo "$line" | sed 's/.* bench: *\([0-9,]*\) ns\/iter.*/\1/')
              pm=$(echo "$line" | sed 's/.*(+\/- \([0-9,]*\)).*/\1/')
              echo "| $name | $ns | $pm |"
            done
          } > comment.md

          existing=$(gh api "repos/${{ github.repository }}/issues/${{ inputs.pr_number }}/comments" \
            --jq '.[] | select(.body | startswith("## Benchmark results")) | .id' | head -1)

          if [ -n "$existing" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$existing" \
              -X PATCH -F "body=@comment.md"
          else
            gh pr comment "${{ inputs.pr_number }}" --body-file comment.md
          fi
