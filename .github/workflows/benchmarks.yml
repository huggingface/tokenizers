name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "tokenizers/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post benchmark results to (leave empty to just store baseline)"
        required: false
        type: string

permissions:
  contents: write

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenizers
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download benchmark data
        run: uvx --from huggingface_hub hf download hf-internal-testing/tokenizers-bench-data --repo-type dataset --local-dir data

      - name: Run benchmarks
        run: cargo bench --bench ci_benchmark -- --output-format bencher | tee output.txt

      - name: Store baseline
        if: hashFiles('tokenizers/output.txt') != ''
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7
        with:
          name: Tokenizers Rust Benchmarks
          tool: cargo
          output-file-path: tokenizers/output.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          auto-push: true
          alert-threshold: "115%"
          comment-on-alert: true
