name: Node
on:
  push:
    branches:
      - main
    paths-ignore:
      - bindings/python/**
  pull_request:
    paths-ignore:
      - bindings/python/**

jobs:
  build_and_test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      # Necessary for now for the cargo cache: https://github.com/actions/cache/issues/133#issuecomment-599102035
      - run: sudo chown -R $(whoami):$(id -ng) ~/.cargo/

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: bindings/node

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: latest

      - name: Install dependencies
        working-directory: ./bindings/node
        run: yarn install

      - name: Build all
        working-directory: ./bindings/node
        run: yarn build

      - name: Lint TS
        working-directory: ./bindings/node
        run: yarn lint

      - name: Run JS tests
        working-directory: ./bindings/node
        run: make test

  rust_quality:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - run: sudo chown -R $(whoami):$(id -ng) ~/.cargo/

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: bindings/node

      - name: Lint Rust formatting
        run: cargo fmt --manifest-path ./bindings/node/Cargo.toml -- --check

      - name: Lint Rust with Clippy
        run: cargo clippy --manifest-path ./bindings/node/Cargo.toml --all-targets --all-features -- -D warnings

  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@74e87cbfa15a59692b158178d8905a61bf6fca95  # v2.75.20
        with:
          tool: cargo-audit

      # Cargo.lock is gitignored, so generate it before auditing.
      - name: Generate Cargo.lock
        run: cargo generate-lockfile --manifest-path ./bindings/node/Cargo.toml

      - name: Run Audit
        run: cargo audit -D warnings -f ./bindings/node/Cargo.lock --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0014 --ignore RUSTSEC-2025-0119
