name: Python

on:
  push:
    branches:
      - main
    paths-ignore:
      - bindings/node/**
  pull_request:
    paths-ignore:
      - bindings/node/**

jobs:
  build_win_32:
    name: Check it builds for Windows 32-bit
    runs-on: windows-latest
    strategy:
      matrix:
        # The cdylib is built with `abi3-py310`, so a single binary covers
        # 3.10–3.14. Free-threaded 3.14t is the only interpreter that needs
        # its own build (no abi3 / limited API).
        python: ["3.14", "3.14t"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: i686-pc-windows-msvc

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          architecture: x86

      - name: Build
        run: cargo build --target i686-pc-windows-msvc --manifest-path ./bindings/python/Cargo.toml

  build_and_test:
    name: Check everything builds & tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.14", "3.14t"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: bindings/python
          shared-key: python

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          architecture: "x64"

      - name: Install
        working-directory: ./bindings/python
        run: |
          python -m venv .env
          source .env/bin/activate
          pip install -U pip
          pip install pytest pytest-asyncio requests setuptools_rust numpy pyarrow datasets ruff ty maturin
          # Build via maturin so we can drop the abi3 cargo feature on
          # free-threaded Python (3.14t can't load abi3 extensions).
          # `pip install -e .` would build through maturin's PEP 660 path
          # which keeps abi3 enabled regardless of the interpreter.
          if python -c 'import sys; sys.exit(0 if sys._is_gil_enabled() else 1)' 2>/dev/null; then
            maturin develop --release
          else
            maturin develop --release --no-default-features --features ext-module
          fi

      - name: Run tests
        working-directory: ./bindings/python
        run: |
          source .env/bin/activate
          # `make test` also runs `cargo test --no-default-features` which
          # links libpython via pyo3's `auto-initialize`. On free-threaded
          # Python the macOS runner doesn't ship libpython3.14t in the
          # framework path, so on 3.14t we run only the python half.
          if python -c 'import sys; sys.exit(0 if sys._is_gil_enabled() else 1)' 2>/dev/null; then
            make test
          else
            make test-py
          fi

  quality:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: bindings/python
          shared-key: python

      - name: Lint with RustFmt
        run: cargo fmt --manifest-path ./bindings/python/Cargo.toml -- --check

      - name: Lint with Clippy
        run: cargo clippy --manifest-path ./bindings/python/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          architecture: "x64"

      # check-style builds the abi3 cdylib and imports it, which only works
      # under a GIL interpreter — hence pinned to 3.14, not free-threaded 3.14t.
      - name: Install
        working-directory: ./bindings/python
        run: |
          python -m venv .env
          source .env/bin/activate
          pip install -U pip
          pip install pytest pytest-asyncio requests setuptools_rust numpy pyarrow datasets ruff ty maturin
          maturin develop --release

      - name: Check style
        working-directory: ./bindings/python
        run: |
          source .env/bin/activate
          make check-style

  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run Audit
        run: cargo audit -D warnings -f ./bindings/python/Cargo.lock --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0014 --ignore RUSTSEC-2025-0119
