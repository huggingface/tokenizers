name: Node Release

on:
  push:
    tags:
      - node-v*

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: i686-pc-windows-msvc
            build: |
              yarn build --target i686-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: |
              yarn build --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              set -e
              yarn build --target x86_64-unknown-linux-musl
              strip -x *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: |
              set -e
              yarn build --target aarch64-unknown-linux-gnu
              aarch64-unknown-linux-gnu-strip *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              set -e
              rustup target add aarch64-unknown-linux-musl
              yarn build --target aarch64-unknown-linux-musl
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: |
              set -e
              sudo apt-get update
              sudo apt-get install -y gcc-arm-linux-gnueabihf
              yarn build --target armv7-unknown-linux-gnueabihf
              arm-linux-gnueabihf-strip *.node
          - host: ubuntu-latest
            target: aarch64-linux-android
            build: |
              yarn build --target aarch64-linux-android
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build: |
              yarn build --target x86_64-unknown-freebsd
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: ./bindings/node/yarn.lock

      - name: Install dependencies
        if: ${{ !matrix.settings.docker }}
        working-directory: ./bindings/node
        run: yarn install --frozen-lockfile

      - name: Build native (host)
        if: ${{ !matrix.settings.docker && !matrix.settings.build }}
        working-directory: ./bindings/node
        run: |
          yarn build --target ${{ matrix.settings.target }}
          strip -x *.node || true

      - name: Build native (custom)
        if: ${{ !matrix.settings.docker && matrix.settings.build }}
        working-directory: ./bindings/node
        run: ${{ matrix.settings.build }}

      - name: Build native (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: >-
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build/bindings/node
          run: |
            corepack enable
            yarn install --frozen-lockfile
            ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: ./bindings/node/yarn.lock

      - name: Install dependencies
        working-directory: ./bindings/node
        run: yarn install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bindings/node/artifacts

      - name: Move artifacts
        working-directory: ./bindings/node
        run: yarn artifacts

      - name: List packages
        working-directory: ./bindings/node
        run: ls -R ./npm
        shell: bash

      - name: Publish
        working-directory: ./bindings/node
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
