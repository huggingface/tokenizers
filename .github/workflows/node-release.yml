name: Node Release

env:
  APP_NAME: tokenizers
  MACOSX_DEPLOYMENT_TARGET: '12.0'

permissions:
  contents: read

on:
  push:
    tags:
      - v*

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              yarn build --target x86_64-apple-darwin
              strip -x *.node
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              yarn build --target aarch64-apple-darwin
              strip -x *.node
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: yarn build --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: i686-pc-windows-msvc
            build: yarn build --target i686-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian@sha256:6f910fc8a723a1eeab2483d2302e8c1fabe36e54c51eb0da27fafd5c3083e08c
            build: |
              set -e
              yarn build --target x86_64-unknown-linux-gnu
              strip *.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: yarn build --target x86_64-unknown-linux-musl --zig
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: yarn build --target aarch64-unknown-linux-gnu --zig
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: yarn build --target aarch64-unknown-linux-musl --zig
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: yarn build --target armv7-unknown-linux-gnueabihf --zig
          - host: ubuntu-latest
            target: aarch64-linux-android
            build: yarn build --target aarch64-linux-android
          - host: ubuntu-latest
            target: armv7-linux-androideabi
            build: yarn build --target armv7-linux-androideabi
    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: ./bindings/node/yarn.lock

      - name: Install dependencies
        if: ${{ !matrix.settings.docker }}
        working-directory: ./bindings/node
        run: yarn install --immutable

      - name: Setup zig
        if: ${{ !matrix.settings.docker && contains(matrix.settings.build, '--zig') }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2.2.1
        with:
          # Pin — without a version the action installs zig master (nightly)
          # whose `zig env` output has drifted and broken the parsers in both
          # napi-rs/cli v2 and cargo-zigbuild. 0.13.0 is what napi-rs's own
          # release templates pin to.
          version: 0.16.0

      - name: Verify zig
        if: ${{ !matrix.settings.docker && contains(matrix.settings.build, '--zig') }}
        run: zig version && which zig

      - name: Build native (host)
        if: ${{ !matrix.settings.docker }}
        working-directory: ./bindings/node
        run: ${{ matrix.settings.build }}

      - name: Build native (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185  # v3
        with:
          image: ${{ matrix.settings.docker }}
          options: >-
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build/bindings/node
          run: |
            rustup update stable && rustup default stable
            corepack enable
            yarn install --immutable
            ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  universal-macOS:
    name: Build universal macOS binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: ./bindings/node/yarn.lock
      - name: Install dependencies
        working-directory: ./bindings/node
        run: yarn install --immutable
      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: bindings-x86_64-apple-darwin
          path: ./bindings/node/artifacts
      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: bindings-aarch64-apple-darwin
          path: ./bindings/node/artifacts
      - name: Combine into universal binary
        working-directory: ./bindings/node
        run: npx napi universal --dir ./artifacts
      - name: Upload universal artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: bindings-universal-apple-darwin
          path: bindings/node/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish:
    permissions:
      contents: read
      id-token: write
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
      - universal-macOS
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: ./bindings/node/yarn.lock
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ./bindings/node
        run: yarn install --immutable
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: ./bindings/node/artifacts
      - name: Move artifacts
        working-directory: ./bindings/node
        run: yarn artifacts
      - name: List packages
        working-directory: ./bindings/node
        run: ls -R ./npm
        shell: bash
      - name: Publish
        working-directory: ./bindings/node
        run: npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}