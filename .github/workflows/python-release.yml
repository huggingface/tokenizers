name: Python Release
on:
  push:
    tags:
      - v*

env:
  AWS_DEFAULT_REGION: us-east-1
  DIST_DIR: ${{ github.sha }}

jobs:
  lock_exists:
    runs-on: ubuntu-latest
    name: Cargo.lock
    steps:
      - uses: actions/checkout@v4
      - name: Cargo.lock lock exists 
        run: cat Cargo.lock
        working-directory: ./bindings/python

  build:
    name: build on ${{ matrix.platform || matrix.os }} (${{ matrix.target }} - ${{ matrix.manylinux || 'auto' }})
    # only run on push to main and on release
    needs: [lock_exists]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'Full Build')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        target: [x86_64, aarch64]
        manylinux: [auto]
        include:
          - os: ubuntu
            platform: linux
          - os: windows
            ls: dir
            interpreter: 3.14 3.14t
          - os: windows
            ls: dir
            target: x86_64
            python-architecture: x64
            python-install: |
                3.14
                3.14t
            interpreter: 3.14 3.14t
          - os: windows
            ls: dir
            target: i686
            python-architecture: x86
            python-install: | 
                3.14
                3.14t
            interpreter: 3.14 3.14t
          - os: windows-11-arm
            ls: dir
            target: aarch64
            python-architecture: arm64
            python-install: |
              3.14
              3.14t
            interpreter: 3.14 3.14t
              # - os: windows
              #   ls: dir
              #   target: aarch64
              #   interpreter: 3.11 3.12
          - os: macos
            target: aarch64
            interpreter: 3.14 3.14t
          - os: ubuntu
            platform: linux
            target: i686
          - os: ubuntu
            platform: linux
            target: aarch64

          - os: ubuntu
            platform: linux
            target: armv7
            interpreter: 3.14 3.14t
          # musllinux
          - os: ubuntu
            platform: linux
            target: x86_64
            manylinux: musllinux_1_1
          - os: ubuntu
            platform: linux
            target: aarch64
            manylinux: musllinux_1_1
          - os: ubuntu
            platform: linux
            target: ppc64le
            interpreter: 3.14 3.14t
          - os: ubuntu
            platform: linux
            target: s390x
            interpreter: 3.14 3.14t
        exclude:
          - os: windows
            target: aarch64
              #   # Optimized PGO builds for x86_64 manylinux and windows follow a different matrix,
              #   # maybe in future maturin-action can support this automatically
              #   - os: ubuntu
              #     target: x86_64
              #     manylinux: auto
              #   - os: windows
              #     target: x86_64
              # Windows on arm64 only supports Python 3.11+

    runs-on: ${{
        matrix.os == 'windows-11-arm' && matrix.os ||
        format('{0}-latest', matrix.os)
      }}
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-install || '3.14' }}
          architecture: ${{ matrix.python-architecture || 'x64' }}

      - run: pip install -U twine

      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: ./bindings/python
          manylinux: ${{ matrix.manylinux || 'auto' }}
          container: ${{ matrix.container }}
          args: --release --out dist --interpreter ${{ matrix.interpreter || '3.14 3.14t' }} ${{ matrix.extra-build-args }}
          rust-toolchain: stable
          docker-options: -e CI

      - run: ${{ matrix.ls || 'ls -lh' }} dist/
        working-directory: ./bindings/python

      - run: twine check --strict dist/*
        working-directory: ./bindings/python

      - name: Report wheel sizes
        working-directory: ./bindings/python
        run: |
          echo "## 🐍 Python Wheel Size — ${{ matrix.os }} ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Wheel (.whl) = compressed archive downloaded from PyPI." >> $GITHUB_STEP_SUMMARY
          echo "Installed .so/.pyd = actual shared library loaded at runtime." >> $GITHUB_STEP_SUMMARY
          echo "The installed size is what matters for on-device deployment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel | Wheel size | Installed .so/.pyd |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          EXTRACT_DIR=$(mktemp -d)
          for f in dist/*.whl; do
            WHL_SIZE=$(du -h "$f" | cut -f1)
            NAME=$(basename "$f")
            rm -rf "$EXTRACT_DIR"/*
            (cd "$EXTRACT_DIR" && unzip -q "$(realpath -- "$OLDPWD/$f" 2>/dev/null || echo "$OLDPWD/$f")" 2>/dev/null) \
              || unzip -q -o "$f" -d "$EXTRACT_DIR" 2>/dev/null || true
            SO_SIZE=$(find "$EXTRACT_DIR" \( -name '*.so' -o -name '*.pyd' -o -name '*.dylib' \) -exec du -h {} \; | head -1 | cut -f1)
            [ -z "$SO_SIZE" ] && SO_SIZE="n/a"
            echo "| \`${NAME}\` | ${WHL_SIZE} | ${SO_SIZE} |" >> $GITHUB_STEP_SUMMARY
          done
          rm -rf "$EXTRACT_DIR"
          echo "" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: pypi_files-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: ./bindings/python/dist
  build-sdist:
    name: build sdist
    needs: [lock_exists]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: ./bindings/python
          command: sdist
          args: --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: pypi_files-srt
          path: ./bindings/python/dist


  upload_package:
    name: Upload package to PyPi
    runs-on: ubuntu-latest
    needs: [build, build-sdist]
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN_DIST }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64

      - uses: actions/download-artifact@v4
        with:
          path: ./bindings/python/dist
          merge-multiple: true

      - name: Wheel size summary
        working-directory: ./bindings/python
        run: |
          echo "## 📦 All Python Wheel Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel | Wheel size | Installed .so/.pyd |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          TOTAL_WHL=0
          TOTAL_SO=0
          EXTRACT_DIR=$(mktemp -d)
          for f in dist/*.whl; do
            WHL_BYTES=$(stat --format=%s "$f" 2>/dev/null || stat -f%z "$f")
            WHL_SIZE=$(du -h "$f" | cut -f1)
            NAME=$(basename "$f")
            rm -rf "$EXTRACT_DIR"/*
            unzip -q -o "$f" -d "$EXTRACT_DIR" 2>/dev/null || true
            SO_FILE=$(find "$EXTRACT_DIR" \( -name '*.so' -o -name '*.pyd' -o -name '*.dylib' \) | head -1)
            if [ -n "$SO_FILE" ]; then
              SO_BYTES=$(stat --format=%s "$SO_FILE" 2>/dev/null || stat -f%z "$SO_FILE")
              SO_SIZE=$(du -h "$SO_FILE" | cut -f1)
              TOTAL_SO=$((TOTAL_SO + SO_BYTES))
            else
              SO_SIZE="n/a"
            fi
            echo "| \`${NAME}\` | ${WHL_SIZE} | ${SO_SIZE} |" >> $GITHUB_STEP_SUMMARY
            TOTAL_WHL=$((TOTAL_WHL + WHL_BYTES))
          done
          rm -rf "$EXTRACT_DIR"
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL_WHL_MB=$(echo "scale=2; $TOTAL_WHL / 1048576" | bc)
          TOTAL_SO_MB=$(echo "scale=2; $TOTAL_SO / 1048576" | bc)
          WHL_COUNT=$(ls dist/*.whl 2>/dev/null | wc -l | tr -d ' ')
          echo "**Total**: ${WHL_COUNT} wheels | wheel: ${TOTAL_WHL_MB} MB | installed: ${TOTAL_SO_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Temporary deactivation while testing abi3 CI
          # - name: Upload to PyPi
          #   working-directory: ./bindings/python
          #   run: |
          #     pip install twine
          #     twine upload dist/* -u __token__ -p "$PYPI_TOKEN"
